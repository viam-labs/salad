name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'

    - name: Setup
      run: make setup

    - name: Pre-build dependencies (workaround for golangci-lint package loader)
      run: go build ./...

    - name: Lint
      run: make check-lint

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Ensure repo is clean
      run: |
        git status
        git diff --quiet
