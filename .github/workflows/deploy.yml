# see https://github.com/viamrobotics/build-action for help
on:
  push:
    tags:
      # we support 0.0.1, v0.0.1, 0.0.1-rc1, v0.0.1-rc1
      - "v?[0-9]+.[0-9]+.[0-9]+"
      - "v?[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"


jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: viamrobotics/build-action@v1
        with:
          # note: you can replace this line with 'version: ""' if
          # you want to test the build process without deploying
          version: ${{ github.ref_name }}
          ref: ${{ github.sha }}
          key-id: ${{ secrets.viam_key_id }}
          key-value: ${{ secrets.viam_key_value }}
          token: ${{ github.token }} # only required for private git repos

  publish-app:
    # Upload the Viam Application bundle (meta.json + dist/) as platform=any,
    # following https://docs.viam.com/build-apps/hosting/deploy/ verbatim.
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: tar -czvf module.tar.gz meta.json dist/
      - name: Install Viam CLI
        run: |
          curl -fsSL -o viam \
            https://storage.googleapis.com/packages.viam.com/apps/viam-cli/viam-cli-stable-linux-amd64
          chmod +x viam
          ./viam version
      - name: viam module upload --platform any
        env:
          VIAM_KEY_ID: ${{ secrets.viam_key_id }}
          VIAM_KEY_VALUE: ${{ secrets.viam_key_value }}
        run: |
          ./viam login api-key --key-id="$VIAM_KEY_ID" --key="$VIAM_KEY_VALUE"
          # --force: the CLI validates that the module entrypoint (bin/salad)
          # is in the archive, but the platform=any upload is the application
          # bundle, not the module binary. Likely a Viam CLI bug for hybrid
          # modules.
          ./viam module upload \
            --force \
            --upload module.tar.gz \
            --platform any \
            --version "${GITHUB_REF_NAME#v}"
