service:
  golangci-lint-version: 1.61.x
run:
  timeout: 10m
  deadline: 900s
  modules-download-mode: readonly
  tests: true
linters:
  exclusions:
    paths:
      - etc/tools.go

  enable-all: true
  disable:
    - asasalint
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - depguard
    - exhaustruct
    - fatcontext
    - forcetypeassert
    - funlen
    - gocognit
    - godox
    - err113
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
    - godot
    - gofmt
    - goimports
    - gomnd
    - importas
    - inamedparam
    - interfacebloat
    - intrange
    - ireturn
    - lll
    - maintidx
    - makezero
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilnil
    - nlreturn
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - revive
    - spancheck
    - stylecheck
    - tagliatelle
    - tenv
    - testpackage
    - thelper
    - varnamelen
    - wrapcheck
    - wsl
linters-settings:
  errcheck:
    check-blank: true
  gci:
    sections:
      - standard
      - default
      - prefix(salad)
  gofumpt:
    lang-version: "1.26"
    extra-rules: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      - composites
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
        disabled: false
        arguments:
          - allowTypesBefore: "testing.TB,*testing.T,*testing.B,*testing.F"
      - name: context-keys-type
      - name: dot-imports
      - name: empty-block
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: errorf
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: var-declaration
      - name: var-naming
  lll:
    line-length: 140
issues:
  exclude-use-default: false
  exclude-dirs-use-default: false
  exclude-dirs:
    - downloads
    - dist
    - node_modules
    - meshifier
  max-per-linter: 0
  max-same-issues: 0
